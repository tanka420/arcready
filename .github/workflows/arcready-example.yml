name: ArcReady Example

on:
  pull_request:
  push:
    branches: [main]

jobs:
  arcready:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run ArcReady
        uses: ./actions/github
        with:
          working-directory: .
          fail-on: critical
          upload-artifact: true
